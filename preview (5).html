<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Special Surprise 🍾</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@300;400&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: #f9d8d6;
      background-image:
        radial-gradient(ellipse at 80% 20%, #fce4ec 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, #f8bbd0 0%, transparent 60%);
      font-family: "Lato", sans-serif;
      cursor: default;
      user-select: none;
    }
    #bottle-wrap {
      position: absolute;
      bottom: -38vh;
      left: -8vw;
      width: 64vw;
      max-width: 620px;
      transform: rotate(45deg);
      transform-origin: bottom left;
      cursor: pointer;
      z-index: 20;
    }
    #bottle-wrap:hover { filter: drop-shadow(0 0 18px rgba(194,104,122,0.35)); }
    @keyframes shake {
      0%,100% { transform: rotate(45deg) translateX(0); }
      15%     { transform: rotate(47.5deg) translateX(7px); }
      30%     { transform: rotate(42.5deg) translateX(-7px); }
      45%     { transform: rotate(47deg) translateX(6px); }
      60%     { transform: rotate(43deg) translateX(-6px); }
      75%     { transform: rotate(46.5deg) translateX(5px); }
      90%     { transform: rotate(43.5deg) translateX(-4px); }
    }
    #bottle-wrap.shaking { animation: shake 0.36s ease-in-out 7; }
    #bottle-svg { width: 100%; height: auto; display: block; }
    #cap-group { transform-origin: 50% 100%; }
    @keyframes cap-fly {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(280px,-440px) rotate(560deg); opacity: 0; }
    }
    #cap-group.flying { animation: cap-fly 0.7s ease-in forwards; }
    #spray-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 40;
    }
    #congrats-text {
      position: absolute;
      top: 5vh; right: 3vw; left: 45%;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: opacity 1.2s 0.4s;
    }
    #congrats-text.visible { opacity: 1; }
    #congrats-text h1 {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-size: clamp(18px, 3.2vw, 42px);
      color: #8b1a38;
      line-height: 1.35;
      text-shadow: 0 2px 14px rgba(255,255,255,0.85);
    }
    #congrats-text h1 .name { color: #c2687a; }
  </style>

<style>
.balloon,.star{
 position:absolute; pointer-events:none; opacity:0;
}
.balloon{
 border-radius:50%;
 background:rgba(255,255,255,.45);
 animation: floatDown 8s linear infinite;
}
.star{
 font-size:16px;
 animation: floatDown 7s linear infinite;
}
@keyframes floatDown{
 from{transform:translateY(-15vh);opacity:0}
 10%{opacity:.55}
 to{transform:translateY(120vh);opacity:0}
}
</style>

</head>

</div>

<script>
  const wrap       = document.getElementById("bottle-wrap");
  const capGroup   = document.getElementById("cap-group");
  const canvas     = document.getElementById("spray-canvas");
  const ctx        = canvas.getContext("2d");
  const congratsEl = document.getElementById("congrats-text");
  const bgMusic    = document.getElementById("bgMusic");
  let opened = false, animRunning = false, particles = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  function handleClick() {
    if (opened || animRunning) return;
    animRunning = true;
    bgMusic.volume = 0.85;
    bgMusic.play().catch(() => {});
    wrap.classList.add("shaking");
    setTimeout(() => {
      wrap.classList.remove("shaking");
      capGroup.classList.add("flying");
      setTimeout(() => {
        congratsEl.classList.add("visible");
        opened = true;
        launchConfetti();
      }, 600);
    }, 2520);
  }

  const COLORS = [
    "#f9a8d4","#f472b6","#ec4899","#db2777",
    "#fde68a","#fbbf24","#f59e0b",
    "#a5f3fc","#67e8f9","#22d3ee",
    "#bbf7d0","#86efac","#4ade80",
    "#c4b5fd","#a78bfa","#8b5cf6",
    "#ffffff","#fca5a5","#fdba74"
  ];

  function getMouthPos() {
    const svg = document.getElementById("bottle-svg");
    const pt  = svg.createSVGPoint();
    pt.x = 160; pt.y = 78;
    const sp = pt.matrixTransform(svg.getScreenCTM());
    return { x: sp.x, y: sp.y };
  }

  function launchConfetti() {
    const m = getMouthPos();
    for (let i = 0; i < 300; i++) spawn(m, true);
    animate(m);
  }

  function spawn(m, burst) {
    const speed = burst ? 5 + Math.random()*15 : 2 + Math.random()*5;
    let vx, vy;
    if (burst) {
      const a = -Math.PI*0.9 + Math.random()*Math.PI*0.8;
      vx = Math.cos(a)*speed;
      vy = Math.sin(a)*speed - 4;
    } else {
      vx = (Math.random()-0.5)*5;
      vy = -Math.random()*3 - 1;
    }
    particles.push({
      x: m.x+(Math.random()-0.5)*30, y: m.y+(Math.random()-0.5)*30,
      vx, vy,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      size: 5+Math.random()*9,
      rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.28,
      shape: Math.random()<0.5 ? "rect" : "circle",
      life: 1,
      decay: 0.003+Math.random()*0.003,
      gravity: 0.15+Math.random()*0.13
    });
  }

  let fc = 0;
  function animate(m) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    fc++;
    if (fc%3===0) {
      for (let i=0;i<5;i++) spawn({x:Math.random()*canvas.width,y:-12},false);
      for (let i=0;i<4;i++) spawn(m,true);
    }
    particles = particles.filter(p=>p.life>0 && p.y<canvas.height+40);
    for (const p of particles) {
      p.vy+=p.gravity; p.x+=p.vx; p.y+=p.vy;
      p.rot+=p.rotSpeed; p.life-=p.decay;
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.life);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      if (p.shape==="rect") ctx.fillRect(-p.size/2,-p.size*0.3,p.size,p.size*0.6);
      else { ctx.beginPath(); ctx.ellipse(0,0,p.size*0.5,p.size*0.3,0,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    }
    requestAnimationFrame(()=>animate(m));
  }
</script>

<script>

function launchBalloons(){
 setTimeout(()=>{
   const colors=['rgba(255,215,0,.45)','rgba(255,255,255,.45)','rgba(255,192,203,.45)'];
   const starColors=['#ffd700','#ffffff','#ffc0cb'];

   setInterval(()=>{
     const b=document.createElement('div');
     b.className='balloon';
     const s=20+Math.random()*55;
     b.style.width=s+'px';
     b.style.height=(s*1.25)+'px';
     b.style.left=(Math.random()*100)+'vw';
     b.style.background=colors[Math.floor(Math.random()*colors.length)];
     document.body.appendChild(b);

     setTimeout(()=>b.remove(),9000);
   },350);

   setInterval(()=>{
     const st=document.createElement('div');
     st.className='star';
     st.textContent='★';
     st.style.color=starColors[Math.floor(Math.random()*starColors.length)];
     st.style.left=(Math.random()*100)+'vw';
     st.style.fontSize=(10+Math.random()*22)+'px';
     document.body.appendChild(st);

     setTimeout(()=>st.remove(),8000);
   },250);
 },1000);
}
document.addEventListener('DOMContentLoaded',()=>{
 const wrap=document.getElementById('bottle-wrap');
 if(wrap){ wrap.addEventListener('click', launchBalloons, {once:true}); }
});
</script>
